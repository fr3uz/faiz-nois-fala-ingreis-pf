<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#0f0f0f">
    <meta name="apple-mobile-web-app-title" content="FNFIPF">
    <title>faiz nois fala ingreis pur favor</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="icon" href="logo.svg" type="image/svg+xml">
</head>
<body>
    <div class="app">
        <!-- Header -->
        <header class="header">
            <img src="logo.svg" alt="FNFIPF">
            <div class="stats">
                <span>XP: <span id="xp">0</span></span>
                <span>🔥 <span id="streak">0</span></span>
                <span>❤️ <span id="hearts">5</span></span>
            </div>
        </header>
        
        <!-- XP Bar -->
        <div class="xp-bar">
            <div class="xp-fill" id="xp-bar"></div>
        </div>
        
        <!-- Language Selector -->
        <div class="lang-selector">
            <select id="lang" onchange="trocarIdioma(this.value); ativarAudio()">
                <option value="en">🇺🇸 English</option>
                <option value="fr">🇫🇷 Français</option>
            </select>
        </div>
        
        <!-- Main Content -->
        <main>
            <!-- Home / Lição -->
            <section id="home" class="section">
                <h2>📅 <span id="lesson-title">Lição do Dia</span></h2>
                <div id="lesson">
                    <p id="question">Clique em Iniciar para começar</p>
                    <div class="options" id="options">
                        <button onclick="responder(this)">A</button>
                        <button onclick="responder(this)">B</button>
                        <button onclick="responder(this)">C</button>
                        <button onclick="responder(this)">D</button>
                    </div>
                </div>
                <p id="result"></p>
            </section>
            
            <!-- Teste de Nivelamento -->
            <section id="test" class="section" style="display:none;">
                <h2>📋 Teste de Nivelamento</h2>
                <p>Básico → Intermediário → Avançado</p>
                <div class="progress-bar">
                    <div class="progress-fill" id="test-progress"></div>
                </div>
                <p id="test-question">Clique em Iniciar</p>
                <div class="options" id="test-options">
                    <button onclick="responderTeste(this)">A</button>
                    <button onclick="responderTeste(this)">B</button>
                    <button onclick="responderTeste(this)">C</button>
                    <button onclick="responderTeste(this)">D</button>
                </div>
                <p id="test-result"></p>
                <button class="btn" id="start-test-btn" onclick="iniciarTeste()">▶ Iniciar Teste</button>
                <button class="btn" id="next-test-btn" onclick="proximaEtapa()" style="display:none;">Continuar</button>
            </section>
            
            <!-- Perfil -->
            <section id="profile" class="section" style="display:none;">
                <h2>👤 <span id="profile-title">Meu Perfil</span></h2>
                <div class="profile-info">
                    <div><span>XP:</span> <b id="profile-xp">0</b></div>
                    <div><span>Streak:</span> <b id="profile-streak">0</b> dias</div>
                    <div><span>Hearts:</span> <b id="profile-hearts">5</b></div>
                    <div><span>Nível:</span> <b id="profile-level">-</b></div>
                    <div><span>Teste:</span> <b id="profile-test">Não feito</b></div>
                </div>
                <button class="btn" onclick="iniciarTeste()">📋 Fazer Teste</button>
                <button class="btn danger" onclick="resetar()">🔄 Resetar</button>
            </section>
        </main>
        
        <!-- Navigation -->
        <nav class="nav">
            <button class="nav-btn active" onclick="mostrar('home')">🏠<br><span>Início</span></button>
            <button class="nav-btn" onclick="mostrar('test')">📝<br><span>Teste</span></button>
            <button class="nav-btn" onclick="mostrar('profile')">👤<br><span>Perfil</span></button>
        </nav>
    </div>
    
    <script src="js/main.js"></script>
</body>
</html>
